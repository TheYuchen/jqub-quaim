<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuAIM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
  </head>
  <body class="bg-canvas text-ink font-sans antialiased">
    <!-- Apply stored theme before first paint so returning users who
         picked Dark or GMU don't see a flash of the light default. The
         light theme IS the :root default, so it needs no attribute. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("jqub.theme");
          if (t === "dark" || t === "gmu") {
            document.documentElement.dataset.theme = t;
          }
        } catch (_) { /* ignore */ }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
